name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Mise
      uses: jdx/mise-action@v4

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Build project
      run: yarn run build
